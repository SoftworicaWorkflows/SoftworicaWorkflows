    <g transform="translate(320,20)">
      <text x="0" y="60" font-family="Segoe UI, Roboto, sans-serif" font-size="52" fill="#e6eefc" font-weight="700">Softworica Workflows</text>
      <text x="0" y="108" font-family="Segoe UI, Roboto, sans-serif" font-size="20" fill="#b6d6ff">Your Future, Our Framework — End-to-end software and automation solutions</text>
      <image href="assets/typing.svg" x="0" y="140" width="520" height="40"/>
