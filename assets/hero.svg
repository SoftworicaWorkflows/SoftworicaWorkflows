<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feBlend in="SourceGraphic" in2="b"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="20" fill="#071127"/>
  <g filter="url(#f)">
    <circle cx="140" cy="180" r="120" fill="url(#g)" opacity="0.18"/>
    <circle cx="1040" cy="180" r="120" fill="#0ea5e9" opacity="0.08"/>
  </g>
  <g transform="translate(80,40)">
